sonar.projectKey=PeteBishwhip_laradocs
sonar.organization=petebishwhip

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=laradocs
#sonar.projectVersion=1.0

# Production code lives in src/; the test suite in tests/. Paths are relative
# to this file.
sonar.sources=src
sonar.tests=tests

# Encoding of the source code.
sonar.sourceEncoding=UTF-8

# Coverage report (Clover), produced by the "coverage" CI job
# (vendor/bin/pest --coverage --coverage-clover=coverage.xml) and consumed here.
sonar.php.coverage.reportPaths=coverage.xml
