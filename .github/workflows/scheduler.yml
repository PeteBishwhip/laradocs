name: Scheduler

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [main]
    paths:
      - 'sponsor.config.ts'
      - 'package.json'
      - '.github/workflows/scheduler.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Update sponsors
        run: npm run build
        env:
          SPONSORKIT_GITHUB_TOKEN: ${{ secrets.SPONSORKIT_GITHUB_TOKEN }}
          SPONSORKIT_GITHUB_LOGIN: PeteBishwhip

      - name: Open pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: sponsors.*
          branch: chore/update-sponsors
          commit-message: 'chore: update sponsors.svg'
          author: GitHub Actions <41898282+github-actions[bot]@users.noreply.github.com>
          title: 'chore: update sponsors.svg'
          body: |
            Automated sponsors refresh generated by the `Scheduler` workflow via [sponsorkit](https://github.com/antfu/sponsorkit).
          delete-branch: true
