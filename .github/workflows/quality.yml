name: quality

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'resources/**'
      - 'stubs/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - 'pint.json'
      - 'rector.php'
      - 'testbench.yaml'
      - '.github/workflows/quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'resources/**'
      - 'stubs/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon'
      - 'phpunit.xml'
      - 'pint.json'
      - 'rector.php'
      - 'testbench.yaml'
      - '.github/workflows/quality.yml'

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    name: Coverage (100%)
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: xdebug
      - run: composer install --prefer-dist --no-interaction
      # Optional suggested dependencies — pull in so their features are exercised
      # and counted towards the 100% coverage requirement.
      - run: composer require "laravel/mcp:^0.8" --no-interaction --no-progress
      - run: composer require "dedoc/scramble:^0.13" --no-interaction --no-progress
      - name: Enforce 100% coverage and write a Clover report
        env:
          XDEBUG_MODE: coverage
        run: vendor/bin/pest --coverage --min=100 --coverage-clover=coverage.xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1
          if-no-files-found: error

  static-analysis:
    runs-on: ubuntu-latest
    name: PHPStan (max)
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: dom, libxml, mbstring
          coverage: none
      - run: composer install --prefer-dist --no-interaction
      # laravel/mcp is an optional (suggested) dependency; install it so PHPStan
      # can resolve the MCP classes and analyse the feature at level max.
      - run: composer require "laravel/mcp:^0.8" --no-interaction --no-progress
      - run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  code-style:
    runs-on: ubuntu-latest
    name: Pint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer install --prefer-dist --no-interaction
      - run: vendor/bin/pint --test

  sonarqube:
    runs-on: ubuntu-latest
    name: SonarQube
    needs: coverage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
