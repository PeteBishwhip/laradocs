name: tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'resources/**'
      - 'stubs/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'testbench.yaml'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'config/**'
      - 'resources/**'
      - 'stubs/**'
      - 'composer.json'
      - 'composer.lock'
      - 'phpunit.xml'
      - 'testbench.yaml'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'
          - laravel: '13.*'
            testbench: '11.*'
          # Dedicated jobs that install dedoc/scramble (^0.13 supports L11–L13)
          # so the Scramble integration tests actually run rather than being skipped.
          - php: '8.3'
            laravel: '11.*'
            testbench: '9.*'
            stability: prefer-stable
            scramble: true
          - php: '8.4'
            laravel: '12.*'
            testbench: '10.*'
            stability: prefer-stable
            scramble: true
          - php: '8.4'
            laravel: '13.*'
            testbench: '11.*'
            stability: prefer-stable
            scramble: true

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - ${{ matrix.stability }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, libxml, mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Install Scramble
        if: matrix.scramble
        run: composer require "dedoc/scramble:^0.13" --no-interaction --no-progress

      - name: Execute tests
        run: vendor/bin/pest
