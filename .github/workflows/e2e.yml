name: e2e

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: Playwright e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, libxml, mbstring
          coverage: none
          # The default php.ini ships variables_order=GPCS, which leaves $_ENV
          # empty under the built-in web server. Laravel's env() reads OS env
          # vars through $_ENV, so LARADOCS_PATH (handed to the Playwright web
          # servers) would be invisible and config('laradocs.path') would fall
          # back to the empty Testbench skeleton docs dir. EGPCS populates $_ENV.
          ini-values: variables_order=EGPCS

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
