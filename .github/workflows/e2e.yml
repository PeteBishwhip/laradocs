name: e2e

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: Playwright e2e

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, libxml, mbstring
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Diagnose docs path resolution
        run: |
          echo "=== php variables_order ==="
          php -i | grep -i variables_order || true
          echo "=== config cache present? ==="
          ls -la vendor/orchestra/testbench-core/laravel/bootstrap/cache/ || true
          echo "=== boot default server with shell env, inspect served docs ==="
          LARADOCS_PATH="${{ github.workspace }}/docs" LARADOCS_SEARCH_DRIVER=json \
            composer serve > /tmp/srv.log 2>&1 &
          for i in $(seq 1 40); do
            curl -sf -o /dev/null http://127.0.0.1:8000/docs && break
            sleep 1
          done
          echo "--- markers (skeleton path == BAD, 'Getting Started' == GOOD) ---"
          curl -s http://127.0.0.1:8000/docs | grep -oE "testbench-core/laravel/docs|Getting Started" | sort -u || true
          echo "--- server log tail ---"
          tail -20 /tmp/srv.log || true
          pkill -f "testbench serve" || true
          sleep 2

      - name: Run Playwright tests
        env:
          LARADOCS_PATH: ${{ github.workspace }}/docs
          LARADOCS_SEARCH_DRIVER: json
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
